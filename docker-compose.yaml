version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: log-analysis-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - MYSQL_DSN=root:password@tcp(mysql:3306)/log_analysis?charset=utf8mb4&parseTime=True&loc=Local
      - LOKI_URL=https://loki.goingf.hk
      - DINGTALK_WEBHOOK=https://oapi.dingtalk.com/robot/send?access_token=0a7a8b33b889fd5b8b78cc36700afdf5d97822aae61378650f1691aaa4eeb636
      - SERVER_PORT=8080
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - log-analysis-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: log-analysis-frontend
    restart: unless-stopped
    ports:
      - "8088:80"
    depends_on:
      - backend
    networks:
      - log-analysis-net

  mysql:
    image: mysql:8.0
    container_name: log-analysis-mysql
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --init-connect='SET NAMES utf8mb4'
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=log_analysis
      - MYSQL_CHARSET=utf8mb4
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/migration/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "13306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - log-analysis-net

volumes:
  mysql_data:
    driver: local

networks:
  log-analysis-net:
    driver: bridge
